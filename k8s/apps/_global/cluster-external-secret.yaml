---
# ClusterExternalSecret: injects a "global-secrets" Kubernetes Secret into every
# namespace that carries the label  secrets.infisical.com/inject-global: "true".
#
# To opt a namespace into global secrets, label it:
#   kubectl label namespace <name> secrets.infisical.com/inject-global=true
# Or add the label to the namespace manifest in git.
#
# The secrets are sourced from Infisical via the "infisical-store" ClusterSecretStore.
# Add or remove entries in the data[] list to control which global secrets are pushed.
apiVersion: external-secrets.io/v1beta1
kind: ClusterExternalSecret
metadata:
  name: global-secrets
  annotations:
    # Wave 2: depends on ClusterSecretStore (wave 1) being ready
    argocd.argoproj.io/sync-wave: "2"
spec:
  # Push to every namespace that carries this label
  namespaceSelector:
    matchLabels:
      secrets.infisical.com/inject-global: "true"

  # How often ESO re-checks Infisical for updated values
  refreshTime: 1h

  externalSecretSpec:
    refreshInterval: 1h

    secretStoreRef:
      name: infisical-store
      kind: ClusterSecretStore

    target:
      # The Secret created in each matched namespace
      name: global-secrets
      creationPolicy: Owner

    # --- Global secret keys ---
    # Each remoteRef.key maps to a secret key name in Infisical.
    # TODO: replace these placeholders with your actual Infisical secret keys.
    data:
      - secretKey: DATABASE_URL
        remoteRef:
          key: DATABASE_URL

      - secretKey: REDIS_URL
        remoteRef:
          key: REDIS_URL

      - secretKey: OTEL_EXPORTER_OTLP_ENDPOINT
        remoteRef:
          key: OTEL_EXPORTER_OTLP_ENDPOINT
