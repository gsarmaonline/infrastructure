---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app
  namespace: example-app
  labels:
    app: example-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      containers:
        - name: example-app
          image: nginx:stable-alpine
          ports:
            - containerPort: 80
          # Consume secrets injected by ESO:
          #   global-secrets     → ClusterExternalSecret in k8s/apps/_global/
          #   example-app-secrets → ExternalSecret in k8s/apps/example-app/
          envFrom:
            - secretRef:
                name: global-secrets
            - secretRef:
                name: example-app-secrets
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
