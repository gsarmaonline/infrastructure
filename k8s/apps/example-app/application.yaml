---
# ArgoCD Application for example-app.
# The app-of-apps Application (k8s/system/argocd/app-of-apps.yaml) discovers
# this file and tells ArgoCD to sync the example-app manifests.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: example-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # TODO: update repoURL to your GitHub repo URL
    repoURL: https://github.com/gsarmaonline/infrastructure.git
    targetRevision: main
    path: k8s/apps/example-app
    # Exclude application.yaml itself so this Application doesn't watch its own
    # definition — prevents a self-reference drift/oscillation loop.
    directory:
      exclude: 'application.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: example-app
  ignoreDifferences:
    - group: networking.k8s.io
      kind: Ingress
      jsonPointers:
        - /spec/rules/0/host
        - /spec/tls/0/hosts/0
        - /spec/tls/0/secretName
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
