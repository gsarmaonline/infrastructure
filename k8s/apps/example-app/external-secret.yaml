---
# ExternalSecret: pulls app-specific secrets from Infisical into the example-app namespace.
#
# ESO creates a Kubernetes Secret named "example-app-secrets" in the example-app
# namespace. The Deployment references it via envFrom (see deployment.yaml).
#
# Secret keys are read from the Infisical project/environment configured in
# the "infisical-store" ClusterSecretStore (k8s/system/infisical/cluster-secret-store.yaml).
#
# TODO: replace the remoteRef.key values with your actual secret names in Infisical.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: example-app-secrets
  namespace: example-app
  annotations:
    # Wave 2: after ClusterSecretStore (wave 1) is ready
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h

  secretStoreRef:
    name: infisical-store
    kind: ClusterSecretStore

  target:
    # Name of the Kubernetes Secret that ESO will create/manage
    name: example-app-secrets
    creationPolicy: Owner

  # --- App-specific secret keys ---
  # Each entry maps a key in the created Secret to a key stored in Infisical.
  # secretKey  = the env var name your app reads
  # remoteRef.key = the secret name in Infisical
  data:
    - secretKey: API_KEY
      remoteRef:
        key: EXAMPLE_APP_API_KEY

    - secretKey: DB_PASSWORD
      remoteRef:
        key: EXAMPLE_APP_DB_PASSWORD
