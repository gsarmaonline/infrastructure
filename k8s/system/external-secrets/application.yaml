---
# ArgoCD Application: installs External Secrets Operator via the official Helm chart.
#
# Bootstrap: apply this file once to register ESO with ArgoCD.
#   kubectl apply -f k8s/system/external-secrets/application.yaml
#
# ESO must be running before any ClusterSecretStore or ExternalSecret resources
# can be created. Use ArgoCD sync waves on dependent resources to enforce order.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Wave -1: install ESO before Infisical and secret stores (wave 0+)
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    # Pin to a minor version range; bump explicitly to control upgrades.
    targetRevision: "0.10.x"
    helm:
      values: |
        # Install all ESO CRDs (ExternalSecret, ClusterSecretStore, etc.)
        installCRDs: true

        # Resource limits for the ESO controller
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"

        # Cert controller handles webhook TLS; keep it lightweight
        certController:
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

        webhook:
          resources:
            requests:
              cpu: "25m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Use server-side apply to handle large CRD manifests cleanly
      - ServerSideApply=true
