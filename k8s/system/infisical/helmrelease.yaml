---
# Nested ArgoCD Application: installs Infisical via the official Helm chart.
#
# This manifest is applied by the parent application.yaml (which syncs this directory).
# ArgoCD will create this Application resource, which then pulls and deploys the
# Infisical Helm chart independently.
#
# Bundled dependencies (enabled below):
#   - PostgreSQL  (bitnami/postgresql sub-chart)
#   - Redis       (bitnami/redis sub-chart)
#
# Bootstrap note — Infisical DB password:
#   The postgres password below is a placeholder. Before applying, either:
#   a) Create the secret manually and set postgresql.auth.existingSecret, or
#   b) Set the password via a SealedSecret / external bootstrap process.
#   Never commit a real password here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
  namespace: argocd
  annotations:
    # Wave 0: after ESO (wave -1), before ClusterSecretStore (wave 1)
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
    chart: infisical-standalone
    # Pin to a minor version; check https://github.com/Infisical/helm-charts for latest.
    targetRevision: "1.7.x"
    helm:
      values: |
        infisical:
          enabled: true
          replicaCount: 1
          image:
            repository: infisical/infisical
            tag: "latest"
            pullPolicy: IfNotPresent

          # Disable automatic SSL cert fetch for internal/self-signed Postgres
          autoDatabaseSslCert: false

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Environment variables injected into the Infisical pod.
          # ENCRYPTION_KEY and AUTH_SECRET must be strong random values.
          # Generate with: openssl rand -hex 32
          # TODO: replace these with references to a pre-created Kubernetes Secret
          #       using envFrom.secretRef once bootstrapped.
          env:
            ENCRYPTION_KEY: "c5f6f28ba6bb1523c4c7cb839edeffb9c17d5de1224547de581e6ee22fb5c09d"
            AUTH_SECRET: "afb5eae3bd6e2537992aa186b281d00c8c1f47f764b14efeceb9dfa4ac111a97"
            # Internal Postgres connection (matches postgresql section below)
            DB_CONNECTION_URI: "postgresql://infisical:local-dev-password@infisical-postgresql:5432/infisical"
            # Internal Redis connection
            REDIS_URL: "redis://infisical-redis-master:6379"
            # Set the site URL (update if you expose Infisical via Ingress)
            SITE_URL: "http://infisical.infisical.svc.cluster.local"

        postgresql:
          enabled: true
          auth:
            username: infisical
            database: infisical
            # TODO: replace with a reference to an existingSecret for production
            password: "local-dev-password"
          primary:
            persistence:
              enabled: true
              size: 8Gi
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"

        redis:
          enabled: true
          architecture: standalone
          auth:
            enabled: false
          master:
            persistence:
              enabled: true
              size: 2Gi
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"

        ingress:
          # Disabled by default; enable and configure if you want to access
          # the Infisical UI from outside the cluster.
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: infisical
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
