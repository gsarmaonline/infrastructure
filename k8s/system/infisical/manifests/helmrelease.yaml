---
# Nested ArgoCD Application: installs Infisical via the official Helm chart.
#
# This manifest is applied by the parent application.yaml (which syncs this directory).
# ArgoCD will create this Application resource, which then pulls and deploys the
# Infisical Helm chart independently.
#
# Bundled dependencies (enabled below):
#   - PostgreSQL  (bitnami/postgresql sub-chart)
#   - Redis       (bitnami/redis sub-chart)
#
# Bootstrap note — Infisical DB password:
#   The postgres password below is a placeholder. Before applying, either:
#   a) Create the secret manually and set postgresql.auth.existingSecret, or
#   b) Set the password via a SealedSecret / external bootstrap process.
#   Never commit a real password here.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infisical
  namespace: argocd
  annotations:
    # Wave 0: after ESO (wave -1), before ClusterSecretStore (wave 1)
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://dl.cloudsmith.io/public/infisical/helm-charts/helm/charts/
    chart: infisical-standalone
    # Pin to a minor version; check https://github.com/Infisical/helm-charts for latest.
    targetRevision: "1.7.x"
    helm:
      values: |
        infisical:
          enabled: true
          replicaCount: 1
          image:
            repository: infisical/infisical
            tag: "latest"
            pullPolicy: IfNotPresent

          # Disable automatic SSL cert fetch for internal/self-signed Postgres
          autoDatabaseSslCert: false

          # ENCRYPTION_KEY and AUTH_SECRET are read from the 'infisical-secrets'
          # Kubernetes Secret (kubeSecretRef default). Bootstrap that secret once:
          #   kubectl create secret generic infisical-secrets -n infisical \
          #     --from-literal=ENCRYPTION_KEY=$(openssl rand -hex 32) \
          #     --from-literal=AUTH_SECRET=$(openssl rand -hex 32)
          # DB_CONNECTION_URI and REDIS_URL are auto-generated by the chart.

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"

        postgresql:
          enabled: true
          auth:
            username: infisical
            database: infisical
            # TODO: replace with a reference to an existingSecret for production
            password: "local-dev-password"
          primary:
            persistence:
              enabled: true
              size: 8Gi
            resources:
              requests:
                cpu: "100m"
                memory: "128Mi"
              limits:
                cpu: "500m"
                memory: "512Mi"

        redis:
          enabled: true
          architecture: standalone
          auth:
            enabled: false
          master:
            persistence:
              enabled: true
              size: 2Gi
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
              limits:
                cpu: "200m"
                memory: "256Mi"

        ingress:
          # Disabled; access Infisical via internal service DNS.
          # Enable and set hostName to expose via Ingress in production.
          enabled: false
          nginx:
            # Disable the bundled nginx ingress controller — we use Traefik.
            # Without this, nginx tries to bind ports 80/443 (already used by Traefik),
            # causing its LoadBalancer service to stay <pending> and block ArgoCD sync.
            enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: infisical
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
