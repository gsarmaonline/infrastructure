---
# ClusterSecretStore: the cluster-wide ESO connector to self-hosted Infisical.
#
# Prerequisites (must exist before this syncs):
#   1. ESO controller running (wave -1)
#   2. Infisical running (wave 0)
#   3. A Machine Identity created in Infisical with read access to your project
#   4. The credentials stored in a Kubernetes Secret:
#
#      kubectl create secret generic infisical-credentials \
#        -n external-secrets \
#        --from-literal=clientId=<machine-identity-client-id> \
#        --from-literal=clientSecret=<machine-identity-client-secret>
#
# Infisical Machine Identity setup:
#   Project Settings → Machine Identities → Create → Universal Auth
#   Grant it "read" on the environments you use (prod, staging, etc.)
#
# After creating the secret above, ArgoCD will sync this store and it will
# show READY=True once Infisical is reachable.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: infisical-store
  annotations:
    # Wave 1: after ESO (wave -1) and Infisical (wave 0) are both running
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    infisical:
      auth:
        universalAuthCredentials:
          clientId:
            # ClusterSecretStore requires an explicit namespace for secretRefs
            namespace: external-secrets
            name: infisical-credentials
            key: clientId
          clientSecret:
            namespace: external-secrets
            name: infisical-credentials
            key: clientSecret

      # Internal cluster DNS for the self-hosted Infisical service.
      # If you expose Infisical via Ingress, use the external URL instead.
      hostAPI: http://infisical.infisical.svc.cluster.local

      # Scope: which Infisical project + environment to read secrets from.
      # TODO: update projectSlug and envSlug to match your Infisical setup.
      # Find the project slug in Infisical: Project Settings → Overview.
      secretsScope:
        projectSlug: "my-project"   # TODO
        environmentSlug: "prod"      # TODO: prod / staging / dev
        secretsPath: "/"            # root path; change for path-based scoping
        recursive: false
